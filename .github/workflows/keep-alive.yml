name: Keep Site Alive

on:
  schedule:
    # Executa a cada 14 minutos para manter o site responsivo
    - cron: '*/14 * * * *'
  workflow_dispatch: # Permite execução manual

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping official site
        run: |
          curl -f https://www.viasullocadora.com.br/ || exit 0

